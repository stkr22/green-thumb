{{- if .Values.ingress.enabled }}
# Single hostname routed entirely to the backend, which serves both the API and
# the built SPA (same origin => no CORS handling needed).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "green-thumb.fullname" . }}
  labels:
    {{- include "green-thumb.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "green-thumb.backend.fullname" . }}
                port:
                  name: http
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
